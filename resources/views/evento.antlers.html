<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <link rel="vrin unamba" sizes="75x75" href="/assets/a_home_otros/logo_vrin.png">
    <link rel="icon" type="image/png" href="/assets/a_home_otros/logo_vrin.png">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta content="width=device-width, initial-scale=1.0, shrink-to-fit=no" name="viewport"/>
    <meta name='viewport' content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} — VRIN UNAMBA</title>
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Roboto+Slab:400,700|Material+Icons" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/latest/css/font-awesome.min.css">
    <!-- Additional CSS vrinstyle -->
    <link rel="stylesheet" href="vrinstyle/css/material-kit.css">
    <link rel="stylesheet" href="/vrinstyle/css/estilos.css">
</head>
<body class="index-page sidebar-collapse">

    {{navbar:template_navbar}}
    
    <div class="evento-page"> 
        <article class="evento-container">

            <header class="evento-header">
                <h1 class="evento-title">{{ title }}</h1>
                <time class="evento-date">{{ date }}</time>
            </header>

            {{ if imagen_principal }}
            <div class="evento-image-wrap">
                <img src="{{ imagen_principal | url }}" alt="{{ title }}" class="evento-img">
            </div>
            {{ /if }}

            <div class="evento-body">
                {{ if direccion_o_vrin }}
                <h2 class="evento-direction">{{ direccion_o_vrin }}</h2>
                {{ /if }}
                <div class="evento-content">
                    {{ content }}
                </div>
            </div>

        </article>
    </div>

    {{footer:footer_template}}

    {{footer:footer_extra}}
    <!-- {{chatbot:template_chat}} -->
    <script src="/vrinstyle/js/vrin.js"></script>
    <script src="/vrinstyle/js/core/jquery.min.js" type="text/javascript"></script>
    <script src="/vrinstyle/js/core/popper.min.js" type="text/javascript"></script>
    <script src="/vrinstyle/js/core/bootstrap-material-design.min.js" type="text/javascript"></script>
    <script src="/vrinstyle/js/plugins/moment.min.js"></script>
    <!--	Plugin for the Datepicker, full documentation here: https://github.com/Eonasdan/bootstrap-datetimepicker -->
    <script src="/vrinstyle/js/plugins/bootstrap-datetimepicker.js" type="text/javascript"></script>
    <!--  Plugin for the Sliders, full documentation here: http://refreshless.com/nouislider/ -->
    <script src="/vrinstyle/js/plugins/nouislider.min.js" type="text/javascript"></script>
    <!--  Google Maps Plugin    -->
    <!-- Control Center for Material Kit: parallax effects, scripts for the example pages etc -->
    <script src="/vrinstyle/js/material-kit.js" type="text/javascript"></script>
</body>
</html>
