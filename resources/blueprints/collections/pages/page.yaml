title: Page
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: titulo_pagina
            field:
              type: text
              display: 'Titulo Pagina'
          -
            handle: texto_bienvenida
            field:
              type: text
              display: 'Texto Bienvenida'
          -
            handle: content
            field:
              type: markdown
              display: Content
              localizable: true
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              localizable: true
              max_items: 1
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
  block_types:
    display: 'Tipo Bloques'
    sections:
      -
        fields:
          -
            handle: block_types
            field:
              display: 'Tipo Bloques'
              type: replicator
              sets:
                main:
                  display: Main
                  sets:
                    servicios_vrin:
                      display: 'Servicios VRIN'
                      fields:
                        -
                          handle: title_1
                          field:
                            display: 'Title 1'
                            type: text
                        -
                          handle: template
                          field:
                            antlers: true
                            type: code
                            display: Template
                    contador_estado:
                      display: 'Contador Estado'
                      fields:
                        -
                          handle: icono_docentes_renacyt
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: 'Icono Docentes RENACYT'
                        -
                          handle: contador_docentes_renacyt
                          field:
                            type: integer
                            display: 'Contador Docentes RENACYT'
                        -
                          handle: icono_grupos_de_investigacion
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: 'Icono Grupos de Investigación'
                        -
                          handle: contador_grupos_de_investigacion
                          field:
                            type: integer
                            display: 'Contador Grupos de Investigación'
                        -
                          handle: icono_lineas_de_investigacion
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: 'Icono Lineas de Investigación'
                        -
                          handle: contador_lineas_de_investigacion
                          field:
                            type: integer
                            display: 'Contador Lineas de Investigación'
                        -
                          handle: icono_articulos_publicados
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: 'Icono Articulos Publicados'
                        -
                          handle: contador_articulos_cientificos
                          field:
                            type: integer
                            display: 'Contador Articulos publicados'
                        -
                          handle: icono_docentes_cti_vitae
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: 'Icono Docentes CTI Vitae'
                        -
                          handle: contador_docentes_cti_vitae
                          field:
                            type: integer
                            display: 'Contador Docentes CTI Vitae'
                        -
                          handle: template
                          field:
                            antlers: true
                            type: code
                            display: Template
                    acerca_vicerrector:
                      display: 'Acerca Vicerrector'
                      fields:
                        -
                          handle: imagen_vicerrector
                          field:
                            max_files: 1
                            container: assets
                            type: assets
                            display: 'Imagen Vicerrector'
                        -
                          handle: nombre_vicerrector
                          field:
                            type: text
                            display: 'Nombre Vicerrector'
                        -
                          handle: cargo
                          field:
                            type: text
                            display: Cargo
                        -
                          handle: template
                          field:
                            antlers: true
                            type: code
                            display: Template
                    blog:
                      display: Blog
                      fields:
                        -
                          handle: titulo_seccion_blog
                          field:
                            type: text
                            display: 'Titulo seccion blog'
                        -
                          handle: template
                          field:
                            antlers: true
                            type: code
                            display: Template
                    info_contacto:
                      display: 'Info contacto'
                      fields:
                        -
                          handle: direccion
                          field:
                            type: text
                            display: Direccion
                        -
                          handle: correo_vrin
                          field:
                            type: text
                            display: 'Correo VRIN'
                        -
                          handle: horario_atencion
                          field:
                            type: text
                            display: 'Horario Atencion'
                        -
                          handle: template
                          field:
                            antlers: true
                            type: code
                            display: Template
                    home_hero:
                      display: 'Home Hero'
                      fields:
                        -
                          handle: hero_image
                          field:
                            container: assets
                            max_files: 1
                            display: 'Hero Image'
                            type: assets
                        -
                          handle: welcome_text
                          field:
                            default: 'Welcome to Edutel'
                            display: 'Welcome Text'
                            type: text
                        -
                          handle: button_text
                          field:
                            default: 'Join Us Now!'
                            display: 'Button Text'
                            type: text
                        -
                          handle: button_link
                          field:
                            display: 'Button Link'
                            type: link
                        -
                          handle: template
                          field:
                            antlers: true
                            default: |-
                              <!-- ***** Main Banner Area Start ***** -->
                                <section class="main-banner" id="top">
                                  <div class="container">
                                    <div class="row">
                                      <div class="col-lg-6 align-self-center">
                                        <div class="header-text">
                                          <h6>{{welcome_text}}</h6>
                                          <h2>{{heading}}</em></h2>
                                          <div class="main-button-gradient">
                                            <div class="scroll-to-section"><a href="{{button_link}}">{{button_text}}</a></div>
                                          </div>
                                        </div>
                                      </div>
                                      <div class="col-lg-6">
                                        <div class="right-image">
                                          <img src="{{hero_image}}" alt="{{heading}}">
                                        </div>
                                      </div>
                                    </div>
                                  </div>
                                </section>
                                <!-- ***** Main Banner Area End ***** -->
                            display: Template
                            type: textarea
                    director_direcciones_vrin:
                      display: 'Director Direcciones VRIN'
                      fields:
                        -
                          handle: nombre_completo
                          field:
                            type: text
