tabs:
  main:
    display: Principal
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: reglamento_o_base
            field:
              options:
                reglamento: Reglamento
                base: 'Base de concurso'
              type: select
              display: Reglamento_o_base
              instructions: 'Seleccione si subirá un Reglamento o Base de Concurso.'
          -
            handle: orden
            field:
              type: integer
              display: Orden
          -
            handle: link_documento
            field:
              type: text
              display: Link_documento
              instructions: 'Ingrese el link del documento que esta publicando.'
          -
            handle: fecha_de_aprobacion
            field:
              type: date
              display: 'Fecha de aprobación'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
title: Reglamento
