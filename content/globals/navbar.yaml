title: Navbar
data:
  template_navbar: |-
    <div class="top-bar">
        <div class="top-bar-inner">
          <a href="mailto:https://vrin.unamba.edu.pe/" class="top-bar-email">
            <i class="fa fa-envelope"></i>
            <span>vrin@unamba.edu.pe</span>
          </a>
          <div class="top-bar-links">
            <a href="/reglamentos" class="top-bar-link">Reglamentos</a>
            <a href="/noticias" class="top-bar-link">Noticias ++</a>
          </div>
        </div>
      </div>

      <!-- ============== HEADER / NAVBAR ============== -->
      <header class="site-header" id="siteHeader">
        <div class="navbar-inner">
         <a class="nav-brand" href="https://vrin.unamba.edu.pe/">
            <img src="assets/dorado_logo.png" alt="Logo VRIN"
                 onerror="this.style.display='none'">
            <div class="nav-brand-text">
              <span>Vicerrectorado</span>
              <span>de Investigación</span>
            </div>
          </a>

          <!-- Menú Desktop -->
          <ul class="nav-menu" id="desktopNav">
            <li>
              <a href="/quienes-somos">Nosotros</a>
            </li>
            <li class="has-dropdown">
              <a href="#" aria-haspopup="true" aria-expanded="false">
                Investigación <i class="fa fa-chevron-down chevron"></i>
              </a>
              <div class="dropdown-panel" role="menu">
                <a href="/docentes-renacyt"><i class="fa fa-chevron-right arrow-icon"></i> Docentes RENACYT</a>
                <a href="/docentes-investigadores"><i class="fa fa-chevron-right arrow-icon"></i> Docentes Investigadores</a>
                <a href="/alumnos-investigadores"><i class="fa fa-chevron-right arrow-icon"></i> Alumnos Investigadores</a>
                <a href="/lineas-de-investigacion"><i class="fa fa-chevron-right arrow-icon"></i> Líneas de Investigación</a>
                <a href="/unidades-de-investigacion"><i class="fa fa-chevron-right arrow-icon"></i> Unidades de Investigación</a>
                <a href="/grupos-de-investigacion"><i class="fa fa-chevron-right arrow-icon"></i> Grupos de Investigación</a>
                <hr>
                <a href="/sisec"><i class="fa fa-chevron-right arrow-icon"></i> Simposio</a>
                <a href="/panel-control"><i class="fa fa-chevron-right arrow-icon"></i>Panel Control</a>
              </div>
            </li>
            <li class="has-dropdown">
              <a href="#" aria-haspopup="true" aria-expanded="false">
                Direcciones <i class="fa fa-chevron-down chevron"></i>
              </a>
              <div class="dropdown-panel" role="menu">
                <a href="/incubadora"><i class="fa fa-chevron-right arrow-icon"></i> Incubadora de Empresas</a>
                <a href="/innovacion"><i class="fa fa-chevron-right arrow-icon"></i> Innovación y Transferencia Tecnológica</a>
                <a href="/produccion"><i class="fa fa-chevron-right arrow-icon"></i> Producción de Bienes y Servicios</a>
                <hr>
                <a href="/institutos"><i class="fa fa-chevron-right arrow-icon"></i> Institutos de Investigación</a>
              </div>
            </li>
            <li><a href="/convocatoria">Convocatorias</a></li>
            <li><a href="/eventos">Eventos</a></li>
          </ul>

          <!-- Botones Desktop -->
          <div class="nav-buttons">
            <a href="/repositorio-institucional" class="btn-repo">
              <i class="fa fa-book"></i> Repositorio
            </a>
            <a href="https://observatorio.unamba.edu.pe/" class="btn-obs">
              <i class="fa fa-eye"></i> Observatorio
            </a>
          </div>

          <!-- Hamburger -->
          <button class="hamburger" id="hamburgerBtn" type="button"
                  aria-label="Abrir menú" aria-expanded="false" aria-controls="mobileNav">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </header>

      <!-- ============== OVERLAY ============== -->
      <div class="drawer-overlay" id="drawerOverlay"></div>

      <!-- ============== DRAWER MÓVIL ============== -->
      <nav class="mobile-nav" id="mobileNav" aria-label="Menú móvil" aria-hidden="true">

        <div class="drawer-header">
          <div class="drawer-brand">
            <div class="drawer-brand-icon">V</div>
            <div class="drawer-brand-text">
              VRIN - UNAMBA
              <small>Vicerrectorado de Investigación</small>
            </div>
          </div>
          <button class="drawer-close" id="drawerClose" type="button" aria-label="Cerrar menú">
            <i class="fa fa-times"></i>
          </button>
        </div>

        <!-- Contenido scrollable -->
        <div class="drawer-body">
          <a href="/quienes-somos" class="mobile-nav-link">
            <span class="nav-link-icon"><i class="fa fa-info-circle"></i></span>
            <span class="nav-link-text">Nosotros</span>
          </a>

          <!-- Investigación -->
          <a href="#" class="mobile-nav-link" id="mobileInvTrigger" role="button"
             aria-expanded="false" aria-controls="mobileInvDropdown">
            <span class="nav-link-icon"><i class="fa fa-flask"></i></span>
            <span class="nav-link-text">Investigación</span>
            <i class="fa fa-chevron-down mobile-chevron"></i>
          </a>
          <div class="mobile-dropdown" id="mobileInvDropdown">
            <a href="/docentes-renacyt"><i class="fa fa-chevron-right arrow-icon"></i> Docentes RENACYT</a>
            <a href="/docentes-investigadores"><i class="fa fa-chevron-right arrow-icon"></i> Docentes Investigadores</a>
            <a href="/alumnos-investigadores"><i class="fa fa-chevron-right arrow-icon"></i> Alumnos Investigadores</a>
            <a href="/lineas-de-investigacion"><i class="fa fa-chevron-right arrow-icon"></i> Líneas de Investigación</a>
            <a href="/unidades-de-investigacion"><i class="fa fa-chevron-right arrow-icon"></i> Unidades de Investigación</a>
            <a href="/grupos-de-investigacion"><i class="fa fa-chevron-right arrow-icon"></i> Grupos de Investigación</a>
            <a href="/sisec"><i class="fa fa-chevron-right arrow-icon"></i> Simposio</a>
            <a href="/panel-control"><i class="fa fa-chevron-right arrow-icon"></i> Panel Control</a>
          </div>

          <!-- Direcciones -->
          <a href="#" class="mobile-nav-link" id="mobileDirTrigger" role="button"
             aria-expanded="false" aria-controls="mobileDirDropdown">
            <span class="nav-link-icon"><i class="fa fa-building"></i></span>
            <span class="nav-link-text">Direcciones</span>
            <i class="fa fa-chevron-down mobile-chevron"></i>
          </a>
          <div class="mobile-dropdown" id="mobileDirDropdown">
            <a href="/incubadora"><i class="fa fa-chevron-right arrow-icon"></i> Incubadora de Empresas</a>
            <a href="/innovacion"><i class="fa fa-chevron-right arrow-icon"></i> Innovación y Transferencia Tecnológica</a>
            <a href="/produccion"><i class="fa fa-chevron-right arrow-icon"></i> Producción de Bienes y Servicios</a>
            <a href="/institutos"><i class="fa fa-chevron-right arrow-icon"></i> Institutos de Investigación</a>
          </div>

          <a href="/convocatoria" class="mobile-nav-link">
            <span class="nav-link-icon"><i class="fa fa-bullhorn"></i></span>
            <span class="nav-link-text">Convocatorias</span>
          </a>

          <a href="/eventos" class="mobile-nav-link">
            <span class="nav-link-icon"><i class="fa fa-calendar"></i></span>
            <span class="nav-link-text">Eventos</span>
          </a>

          <a href="/reglamentos" class="mobile-nav-link">
            <span class="nav-link-icon"><i class="fa fa-file-text-o"></i></span>
            <span class="nav-link-text">Reglamentos</span>
          </a>

          <!-- Accesos rápidos: fluye después de Reglamentos -->
          <div class="drawer-footer">
            <div class="drawer-footer-label">Accesos rápidos</div>
            <div class="drawer-footer-buttons">
              <a href="/repositorio-institucional" class="btn-repo">
                <i class="fa fa-book"></i> Repositorio
              </a>
              <a href="https://observatorio.unamba.edu.pe/" class="btn-obs">
                <i class="fa fa-eye"></i> Observatorio
              </a>
            </div>
          </div>
        </div>
      </nav>