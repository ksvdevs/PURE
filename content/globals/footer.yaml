title: Footer
data:
  footer_template: |-
    <footer class="site-footer" role="contentinfo">
            <div class="footer-inner">
                <div class="footer-grid">

                    <!-- Columna 1: Acerca de -->
                    <div class="footer-col footer-about">
                        <div class="footer-brand">
                            <img src="/assets/vrin/logos.png" alt="VRIN" class="footer-logo">
                            <span class="footer-brand-name">Vicerrectorado de Investigación - UNAMBA</span>
                        </div>
                        <p class="footer-desc">El Vicerrectorado de Investigación (VRIN) es el organismo de la
                            Universidad Nacional Micaela Bastidas de Apurímac encargado de dirigir, conducir, supervisar
                            y evaluar las actividades de investigación científica, tecnológica y humanística.</p>
                        <p class="footer-social-label">Síguenos en redes sociales</p>
                        <div class="footer-social">
                            <a href="https://www.facebook.com/unambaoficial" target="_blank"
                                rel="noopener noreferrer" class="footer-social-btn" aria-label="Facebook">
                                <i class="fa fa-facebook" aria-hidden="true"></i>
                            </a>
                            <a href="https://www.instagram.com/vrinunamba" target="_blank"
                                rel="noopener noreferrer" class="footer-social-btn" aria-label="Instagram">
                                <i class="fa fa-instagram" aria-hidden="true"></i>
                            </a>
                            <a href="https://www.youtube.com/@unambaoficial" target="_blank"
                                rel="noopener noreferrer" class="footer-social-btn" aria-label="YouTube">
                                <i class="fa fa-youtube-play" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>

                    <!-- Columna 2: Contacto -->
                    <div class="footer-col footer-contact">
                        <h3 class="footer-col-title">Contacto</h3>
                        <div class="footer-contact-item">
                            <span class="footer-contact-icon" aria-hidden="true">
                                <i class="fa fa-map-marker"></i>
                            </span>
                            <div>
                                <strong>Dirección</strong>
                                <p>Av. Inca Garcilaso de la Vega<br>Abancay, Apurímac - Perú</p>
                            </div>
                        </div>
                        <div class="footer-contact-item">
                            <span class="footer-contact-icon" aria-hidden="true">
                                <i class="fa fa-envelope"></i>
                            </span>
                            <div>
                                <strong>Correo Electrónico</strong>
                                <p><a href="mailto:vrin@unamba.edu.pe">vrin@unamba.edu.pe</a></p>
                            </div>
                        </div>
                        <div class="footer-contact-item">
                            <span class="footer-contact-icon" aria-hidden="true">
                                <i class="fa fa-phone"></i>
                            </span>
                            <div>
                                <strong>Teléfono</strong>
                                <p><a href="tel:+5183321021">+51 83 321021</a></p>
                            </div>
                        </div>
                    </div>

                    <!-- Columna 3: Enlaces Rápidos -->
                    <div class="footer-col footer-links">
                        <h3 class="footer-col-title">Enlaces Rápidos</h3>
                        <ul class="footer-links-list">
                            <li>
                                <a href="/convocatorias">
                                    <i class="fa fa-external-link" aria-hidden="true"></i>Convocatorias
                                </a>
                            </li>
                            <li>
                                <a href="/proyectos-de-investigacion">
                                    <i class="fa fa-external-link" aria-hidden="true"></i>Proyectos de Investigación
                                </a>
                            </li>
                            <li>
                                <a href="/unidades-de-investigacion">
                                    <i class="fa fa-external-link" aria-hidden="true"></i>Unidades de Investigación
                                </a>
                            </li>
                            <li>
                                <a href="/grupos-de-investigacion">
                                    <i class="fa fa-external-link" aria-hidden="true"></i>Grupos de Investigación
                                </a>
                            </li>
                            <li>
                                <a href="/reglamentos">
                                    <i class="fa fa-external-link" aria-hidden="true"></i>Reglamentos
                                </a>
                            </li>
                            <li>
                                <a href="https://repositorio.unamba.edu.pe" target="_blank" rel="noopener noreferrer">
                                    <i class="fa fa-external-link" aria-hidden="true"></i>Repositorio Institucional
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- Columna 4: Ubicación -->
                    <div class="footer-col footer-map">
                        <h3 class="footer-col-title">Ubicación</h3>
                        <a href="https://www.google.com/maps/place/Universidad+Nacional+Micaela+Bastidas+de+Apur%C3%ADmac/@-13.6183802,-72.8688935,18z"
                            target="_blank" rel="noopener noreferrer" class="footer-map-link"
                            aria-label="Ver UNAMBA en Google Maps">
                            <img src="/assets/ubi_unamba.png" alt="Mapa de ubicación de la UNAMBA en Abancay, Apurímac"
                                class="footer-map-img">
                        </a>
                        <a href="https://www.google.com/maps/place/Universidad+Nacional+Micaela+Bastidas+de+Apur%C3%ADmac/@-13.6183802,-72.8688935,18z"
                            target="_blank" rel="noopener noreferrer" class="footer-map-caption">
                            <i class="fa fa-map-marker" aria-hidden="true"></i>Haz clic para ver en Google
                            Maps
                        </a>
                    </div>

                </div>
            </div>

            <!-- Barra inferior -->
            <div class="footer-bottom">
                <p>Copyright &copy; 2025 &nbsp;<strong>Vicerrectorado de Investigación - UNAMBA</strong> - Todos los
                    derechos reservados.</p>
            </div>
    </footer>